<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOSS End of Shift Form</title>
    <script src="main.js"></script>
    <script>
        openDB()
        window.addEventListener("message", (e) => {
            document.getElementById("addNoteFromClipboardButton").style.display = "none"
            switch (e.data.action){
                case "getAllNotes":
                    getAllNotes()
                    break
                case "addNote":
                    addNote(e.data.string, "")
                    break
            }
        })
    </script>
    <style>
        body{
            font-family: "Open Sans";
        }

        h1 {
            font-size: 20px;
            font-weight: normal;
        }

        .title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 3.5rem;
            padding-bottom: 2rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #d9dfe9;
        }

        a.button {
            padding-inline: 0px;
            border: 1px outset buttonborder;
            border-radius: 3px;
            color: buttontext;
            background-color: buttonface;
            text-decoration: none;
            width: 100%;
            height: 100%;
            display:block;
        }

        .notesbox textarea,
        .notesbox p {
            text-align: left;
        }

        .notesbox button {
            height:fit-content;
            align-self: center;
        }

        @media print {
            button{
                display:none;
            }

            .mainInfoDiv{
                color: black !important;
            }

            .freestyleLink{
                display:none !important;
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1>End of Shift Form</h1>
        <div>
            <button onclick="if(window.confirm('Clear all notes?')) clearAllNotes()" style="cursor: pointer; border: none; background-color: transparent; text-decoration: underline;">Clear All</button>
            <button onclick="print()" style="cursor: pointer; border: none; background-color: transparent; text-decoration: underline;">Print</button>
        </div>
    </div>
    <div id="getAllNotesResult" style="width:fit-content; margin-inline: auto;"></div>
    <button id="addNoteFromClipboardButton" onclick="addNoteFromClipboard()" style="background-color: #bbb; border: none; border-radius: 5px; cursor: pointer; margin-block: 1rem; padding-block: 0.25rem; width: 10rem; margin-inline: auto; display: block;"><i style="background-image: url('./icons/plus-solid-full.svg'); width: 25px; height: 25px; display: block; position: relative; left: 50%; translate: -50% 0"></i></button>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOSS End of Shift Form</title>
    <script src="main.js"></script>
    <script>
        openDB()
    </script>
    <style>
        body{
            font-family: "Open Sans";
        }

        a.button {
            padding-inline: 0px;
            border: 1px outset buttonborder;
            border-radius: 3px;
            color: buttontext;
            background-color: buttonface;
            text-decoration: none;
            width: 100%;
            height: 100%;
            display:block;
        }

        .notesbox button {
            height:fit-content;
            flex-basis: 3rem;
            align-self: center;
        }

        @media print {
            button{
                display:none;
            }

            .mainInfoDiv{
                color: black !important;
            }

            .freestyleLink{
                display:none !important;
            }
        }
    </style>
</head>
<body>
    <h1>End of Shift Form</h1>
    <button onclick="clearAllNotes()" style="background-color: #bbb; border: none; border-radius: 5px; cursor: pointer; margin-block: 1rem; padding-block: 0.25rem; width: 5rem;">Clear All</button>
    <div id="getAllNotesResult"></div>
    <button onclick="addNoteFromClipboard()" style="background-color: #bbb; border: none; border-radius: 5px; cursor: pointer; margin-block: 1rem; padding-block: 0.25rem; width: 5rem;"><i style="background-image: url('./icons/plus-solid-full.svg'); width: 25px; height: 25px; display: block; position: relative; left: 50%; translate: -50% 0"></i></button>
    <button onclick="print()" style="background-color: #bbb; border: none; border-radius: 5px; cursor: pointer; margin-block: 1rem; padding-block: 0.25rem; width: 5rem;"><i style="background-image: url('./icons/plus-solid-full.svg'); width: 25px; height: 25px; display: block; position: relative; left: 50%; translate: -50% 0"></button>
</body>
</html>
